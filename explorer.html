<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Great Circle Explorer</title>
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet">
  <script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    #map { width: 100%; height: 100%; }

    /* ── HUD ───────────────────────────────────────────────────────────────── */
    #hud {
      position: absolute;
      bottom: 28px;
      left: 12px;
      background: rgba(0,0,0,0.72);
      color: #fff;
      font: 14px/1.5 'Helvetica Neue', sans-serif;
      padding: 10px 14px;
      border-radius: 6px;
      min-width: 200px;
      max-width: 260px;
      pointer-events: none;
      user-select: none;
    }
    #hud-status  { color: #aaa; font-size: 12px; margin-bottom: 4px; }
    #hud-result  { font-size: 18px; font-weight: 600; letter-spacing: 0.5px; }
    #hud-detail  { color: #aaa; font-size: 12px; margin-top: 2px; }

    #clear-btn {
      position: absolute;
      top: 12px;
      right: 12px;
      background: rgba(0,0,0,0.72);
      color: #fff;
      font: 13px/1 'Helvetica Neue', sans-serif;
      padding: 8px 14px;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 5px;
      cursor: pointer;
      z-index: 10;
    }
    #clear-btn:hover { background: rgba(40,40,40,0.9); }
    #style-select {
      position: absolute;
      top: 48px;
      right: 12px;
      background: rgba(0,0,0,0.72);
      color: #fff;
      font: 13px/1 'Helvetica Neue', sans-serif;
      padding: 8px 10px;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 5px;
      cursor: pointer;
      z-index: 10;
    }
  </style>
</head>
<body>
  <div id="map"></div>

  <div id="hud">
    <div id="hud-status">Loading mask…</div>
    <div id="hud-result"></div>
    <div id="hud-detail"></div>
    <div id="hud-segments" style="color:#aaa;font-size:12px;margin-top:4px;line-height:1.6;"></div>
    <div id="hud-zoom" style="color:#666;font-size:11px;margin-top:6px;border-top:1px solid rgba(255,255,255,0.1);padding-top:5px;"></div>
  </div>

  <button id="clear-btn">Clear</button>
  <select id="style-select"></select>

  <script>
  // ── Config ──────────────────────────────────────────────────────────────────
  mapboxgl.accessToken = 'pk.eyJ1IjoiZGF2aWRnZWR5ZSIsImEiOiJjbWtvejk5bWkwYnBxM3JxNTE0ZjN6ZmowIn0.CaVScVkAo9uhpyebGqaQNg';

  const MASK_NLAT = 10800;
  const MASK_NLON = 21600;
  const DISPLAY_PTS = 1080;   // points for drawing the line
  const TRANSITION_PTS = 21600; // points for detecting transitions (60 arc-sec)

  const COLOR_OCEAN = '#00bcd4';
  const COLOR_LAND  = '#e53935';
  const COLOR_DRAG  = '#aaa';

  // ── State ───────────────────────────────────────────────────────────────────
  let mask = null;           // Uint8Array (packed bits), loaded async
  let maskReady = false;
  let points = [null, null]; // [A, B], each {lat, lon}
  let markers = [null, null];
  let clickCount = 0;

  // ── UI helpers ──────────────────────────────────────────────────────────────
  const hudStatus   = document.getElementById('hud-status');
  const hudResult   = document.getElementById('hud-result');
  const hudDetail   = document.getElementById('hud-detail');
  const hudSegments = document.getElementById('hud-segments');
  const hudZoom     = document.getElementById('hud-zoom');
  const clearBtn = document.getElementById('clear-btn');
  clearBtn.addEventListener('click', clearQuery);

  function setStatus(msg)  { hudStatus.textContent = msg; }
  function setResult(main, detail) {
    hudResult.textContent = main  || '';
    hudDetail.textContent = detail || '';
  }

  // ── Mask loading ────────────────────────────────────────────────────────────
  async function loadMask() {
    try {
      const resp = await fetch('explorer/mask_60s.bin.gz');
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      const ds = new DecompressionStream('gzip');
      const piped = resp.body.pipeThrough(ds);
      const buf = await new Response(piped).arrayBuffer();
      mask = new Uint8Array(buf);
      maskReady = true;
      setStatus('Click two points');
    } catch (e) {
      setStatus('Mask load failed: ' + e.message);
    }
  }

  function isLand(lat, lon) {
    // Math.floor gives the correct ETOPO cell: cell i occupies [i/60-90, (i+1)/60-90)
    let row = Math.floor((lat + 90) * 60);
    let col = Math.floor((lon + 180) * 60) % MASK_NLON;
    row = Math.max(0, Math.min(MASK_NLAT - 1, row));
    if (col < 0) col += MASK_NLON;
    const i = row * MASK_NLON + col;
    return (mask[i >> 3] >> (7 - (i & 7))) & 1;
  }

  // ── Great circle math ───────────────────────────────────────────────────────
  function toXYZ(lat, lon) {
    const φ = lat * Math.PI / 180, λ = lon * Math.PI / 180;
    return [Math.cos(φ) * Math.cos(λ), Math.cos(φ) * Math.sin(λ), Math.sin(φ)];
  }

  function cross(a, b) {
    return [
      a[1] * b[2] - a[2] * b[1],
      a[2] * b[0] - a[0] * b[2],
      a[0] * b[1] - a[1] * b[0],
    ];
  }

  function norm(v) {
    const m = Math.hypot(v[0], v[1], v[2]);
    return m < 1e-12 ? v : v.map(x => x / m);
  }

  function gcNormal(latA, lonA, latB, lonB) {
    const a = toXYZ(latA, lonA), b = toXYZ(latB, lonB);
    const c = cross(a, b);
    const len = Math.hypot(c[0], c[1], c[2]);
    if (len < 1e-6) {
      // Antipodal: pick arbitrary great circle through A
      const arb = Math.abs(a[0]) < 0.9 ? [1, 0, 0] : [0, 1, 0];
      return norm(cross(a, arb));
    }
    return norm(c);
  }

  function sampleGC(n, nPts) {
    const arb = Math.abs(n[0]) < 0.9 ? [1, 0, 0] : [0, 1, 0];
    const u = norm(cross(n, arb));
    const v = cross(n, u);  // already unit
    const pts = [];
    for (let i = 0; i < nPts; i++) {
      const t = 2 * Math.PI * i / nPts;
      const cos_t = Math.cos(t), sin_t = Math.sin(t);
      const p = [
        cos_t * u[0] + sin_t * v[0],
        cos_t * u[1] + sin_t * v[1],
        cos_t * u[2] + sin_t * v[2],
      ];
      const lat = Math.asin(Math.max(-1, Math.min(1, p[2]))) * 180 / Math.PI;
      const lon = Math.atan2(p[1], p[0]) * 180 / Math.PI;
      pts.push({ lat, lon });
    }
    return pts;
  }

  // Subsample every nth point for display
  function subsample(pts, n) {
    const step = Math.max(1, Math.round(pts.length / n));
    const out = [];
    for (let i = 0; i < pts.length; i += step) out.push(pts[i]);
    return out;
  }

  // Unwrap longitude jumps > 180° so Mapbox draws continuous lines
  function unwrap(pts) {
    if (!pts.length) return pts;
    const out = [pts[0]];
    for (let i = 1; i < pts.length; i++) {
      let lon = pts[i].lon;
      const prev = out[i - 1].lon;
      while (lon - prev >  180) lon -= 360;
      while (prev - lon >  180) lon += 360;
      out.push({ lat: pts[i].lat, lon });
    }
    return out;
  }

  // ── Transition detection ────────────────────────────────────────────────────
  function countTransitions(pts) {
    let count = 0, prev = isLand(pts[0].lat, pts[0].lon);
    for (let i = 1; i < pts.length; i++) {
      const curr = isLand(pts[i].lat, pts[i].lon);
      if (curr !== prev) { count++; prev = curr; }
    }
    return count;
  }

  function computeSegmentStats(pts) {
    const kmPerStep = 40075 / pts.length;
    const segs = [];
    let segLand = isLand(pts[0].lat, pts[0].lon), segLen = 1, segStart = 0;
    for (let i = 1; i < pts.length; i++) {
      const curr = isLand(pts[i].lat, pts[i].lon);
      if (curr === segLand) { segLen++; }
      else {
        segs.push({ land: segLand, len: segLen, start: segStart, end: i - 1, wrapped: false });
        segLand = curr; segLen = 1; segStart = i;
      }
    }
    segs.push({ land: segLand, len: segLen, start: segStart, end: pts.length - 1, wrapped: false });
    // Merge wrap-around: if first and last are same type, stitch them together
    if (segs.length > 1 && segs[0].land === segs[segs.length - 1].land) {
      const last = segs.pop();
      segs[0] = { land: segs[0].land, len: last.len + segs[0].len,
                  start: last.start, end: segs[0].end, wrapped: true };
    }
    let bestOcean = { len: 0 }, bestLand = { len: 0 };
    for (const s of segs) {
      if (s.land) { if (s.len > bestLand.len)  bestLand  = s; }
      else        { if (s.len > bestOcean.len) bestOcean = s; }
    }
    // Segment length by step-counting on a spherical great circle (40,075 km
    // equatorial circumference). This is a spherical approximation; a complete
    // solution would resample along WGS84 geodesics. The ~26 km gap vs
    // Chabukswar & Mukherjee (2018) is primarily due to different masks
    // (ETOPO1 vs ETOPO 2022) and rounded published coordinates, not this model.
    function segKm(s) {
      return (s.len / pts.length) * 40075;
    }
    return {
      longestOcean: segKm(bestOcean),
      longestLand:  segKm(bestLand),
      oceanSeg: bestOcean,
      landSeg:  bestLand,
    };
  }

  function segToCoords(pts, seg, step) {
    if (!seg || seg.len < 2) return null;
    const indices = [];
    if (seg.wrapped) {
      for (let i = seg.start; i < pts.length; i++) indices.push(i);
      for (let i = 0; i <= seg.end; i++) indices.push(i);
    } else {
      for (let i = seg.start; i <= seg.end; i++) indices.push(i);
    }
    // Subsample but always keep endpoints
    const coords = [];
    for (let j = 0; j < indices.length; j += step) coords.push(indices[j]);
    if (coords[coords.length - 1] !== indices[indices.length - 1])
      coords.push(indices[indices.length - 1]);
    // Unwrap longitudes
    const raw = coords.map(i => ({ lat: pts[i].lat, lon: pts[i].lon }));
    return unwrap(raw).map(p => [p.lon, p.lat]);
  }

  function fmtKm(km) {
    if (km < 1) return '—';
    return `${Math.round(km).toLocaleString()} km`;
  }

  // ── Map ─────────────────────────────────────────────────────────────────────
  // ── Style switcher ───────────────────────────────────────────────────────────
  const STYLES = [
    { label: 'Light',              url: 'mapbox://styles/mapbox/light-v11' },
    { label: 'Satellite',         url: 'mapbox://styles/mapbox/satellite-v9' },
    { label: 'Satellite + roads', url: 'mapbox://styles/mapbox/satellite-streets-v12' },
    { label: 'Dark',              url: 'mapbox://styles/mapbox/dark-v11' },
    { label: 'Outdoors',          url: 'mapbox://styles/mapbox/outdoors-v12' },
  ];
  const styleSelect = document.getElementById('style-select');
  STYLES.forEach(s => {
    const opt = document.createElement('option');
    opt.value = s.url; opt.textContent = s.label;
    if (s.url === 'mapbox://styles/mapbox/light-v11') opt.selected = true;
    styleSelect.appendChild(opt);
  });
  styleSelect.addEventListener('change', () => map.setStyle(styleSelect.value));

  const map = new mapboxgl.Map({
    container: 'map',
    style: 'mapbox://styles/mapbox/light-v11',
    projection: 'globe',
    center: [20, 20],
    zoom: 1.5,
    attributionControl: false,
  });
  map.addControl(new mapboxgl.AttributionControl({ compact: true }), 'bottom-right');
  map.addControl(new mapboxgl.NavigationControl(), 'top-left');
  map.addControl(new mapboxgl.ScaleControl({ maxWidth: 160, unit: 'metric' }), 'bottom-right');

  const emptyFC = () => ({ type: 'FeatureCollection', features: [] });

  function setupLayers() {
    map.setFog({ color: '#000', 'high-color': '#000', 'horizon-blend': 0.02 });

    // ── Great circle line (coloured by land/ocean) ────────────────────────
    map.addSource('gc-line', { type: 'geojson', data: emptyFC() });
    map.addLayer({
      id: 'gc-line', type: 'line', source: 'gc-line',
      layout: { 'line-cap': 'round', 'line-join': 'round' },
      paint: {
        'line-color': ['get', 'color'],
        'line-width': ['interpolate', ['exponential', 2], ['zoom'], 0, 1.5, 5, 2.5, 10, 7],
        'line-opacity': 0.88,
      },
    });

    // ── Longest segment highlights ───────────────────────────────────────────
    map.addSource('gc-highlight', { type: 'geojson', data: emptyFC() });
    map.addLayer({
      id: 'gc-highlight', type: 'line', source: 'gc-highlight',
      layout: { 'line-cap': 'round', 'line-join': 'round' },
      paint: {
        'line-color': ['get', 'color'],
        'line-width': ['interpolate', ['exponential', 2], ['zoom'], 0, 3.5, 5, 5.5, 10, 14],
        'line-opacity': 1.0,
      },
    });


    // ── 60 arc-second discretization grid (visible at zoom ≥ 8) ────────────
    map.addSource('grid', { type: 'geojson', data: emptyFC() });
    map.addLayer({
      id: 'grid', type: 'line', source: 'grid',
      paint: {
        'line-color': '#000',
        'line-width': 0.5,
        'line-opacity': ['interpolate', ['linear'], ['zoom'], 8, 0, 9, 0.35],
      },
    });

    // Restore drawn state after style swap
    if (points[0] && points[1]) computeAndDraw();
    updateGrid();
  }

  function updateGrid() {
    if (!map.getSource('grid')) return;
    if (map.getZoom() < 8) { map.getSource('grid').setData(emptyFC()); return; }
    const b = map.getBounds();
    const step = 1 / 60;
    // Grid lines at multiples of 1/60° — these are the ETOPO cell boundaries
    const minLon = Math.floor(b.getWest()  / step) * step;
    const maxLon = Math.ceil (b.getEast()  / step) * step;
    const minLat = Math.floor(b.getSouth() / step) * step;
    const maxLat = Math.ceil (b.getNorth() / step) * step;
    const features = [];
    for (let lon = minLon; lon <= maxLon; lon += step)
      features.push({ type: 'Feature', geometry: { type: 'LineString',
        coordinates: [[lon, minLat], [lon, maxLat]] }, properties: {} });
    for (let lat = minLat; lat <= maxLat; lat += step)
      features.push({ type: 'Feature', geometry: { type: 'LineString',
        coordinates: [[minLon, lat], [maxLon, lat]] }, properties: {} });
    map.getSource('grid').setData({ type: 'FeatureCollection', features });
  }
  map.on('moveend', updateGrid);
  map.on('zoomend', updateGrid);

  // setupLayers() is called on every style load (initial + style changes)
  map.on('style.load', () => {
    setupLayers();
  });

  // One-time event handlers registered after first load
  map.once('load', () => {
    map.on('click', e => {
      const { lat, lng: lon } = e.lngLat;
      if (!isFinite(lat) || !isFinite(lon)) return;
      const idx = clickCount % 2;
      clickCount++;
      placeMarker(idx, lat, lon);
      if (points[0] && points[1]) {
        computeAndDraw();
      } else {
        setStatus('Click a second point');
      }
    });

    const updateZoom = () => hudZoom.textContent = `zoom ${map.getZoom().toFixed(2)}`;
    map.on('zoom', updateZoom);
    updateZoom();

    map.on('mousemove', () => { map.getCanvas().style.cursor = 'crosshair'; });

    if (maskReady) setStatus('Click two points');
  });

  // ── Segment building ────────────────────────────────────────────────────────
  // Split full-resolution points into land/ocean LineString features,
  // subsampling coordinates within each segment for display performance.
  function buildSegmentFeatures(pts, displayStep) {
    if (pts.length < 2) return [];
    const features = [];
    let segStart = 0;
    let segLand = isLand(pts[0].lat, pts[0].lon);

    function flush(endIdx) {
      if (endIdx - segStart < 1) return;
      const coords = [];
      for (let j = segStart; j <= endIdx; j += displayStep) coords.push([pts[j].lon, pts[j].lat]);
      if (coords[coords.length - 1] !== [pts[endIdx].lon, pts[endIdx].lat])
        coords.push([pts[endIdx].lon, pts[endIdx].lat]);
      if (coords.length >= 2) features.push({
        type: 'Feature',
        geometry: { type: 'LineString', coordinates: coords },
        properties: { color: segLand ? COLOR_LAND : COLOR_OCEAN },
      });
    }

    for (let i = 1; i < pts.length; i++) {
      const curr = isLand(pts[i].lat, pts[i].lon);
      if (curr !== segLand) {
        flush(i);
        segStart = i;
        segLand = curr;
      }
    }
    flush(pts.length - 1);
    return features;
  }

  // ── Marker helpers ───────────────────────────────────────────────────────────
  function makeMarker(idx) {
    const el = document.createElement('div');
    el.style.cssText = [
      'color:#fff', 'font-size:24px', 'font-weight:bold', 'line-height:1',
      'text-shadow:0 0 3px #000,0 0 3px #000', 'cursor:grab', 'user-select:none',
      'display:inline-block', 'width:fit-content',
    ].join(';');
    el.textContent = '+';
    const m = new mapboxgl.Marker({ element: el, draggable: true, anchor: 'center' });
    m.on('drag', () => {
      const ll = m.getLngLat();
      points[idx] = { lat: ll.lat, lon: ll.lng };
      if (points[0] && points[1]) drawFast();
    });
    m.on('dragend', () => {
      if (points[0] && points[1]) computeAndDraw();
    });
    return m;
  }

  function placeMarker(idx, lat, lon) {
    points[idx] = { lat, lon };
    if (!markers[idx]) {
      markers[idx] = makeMarker(idx);
      markers[idx].setLngLat([lon, lat]);
      markers[idx].addTo(map);
    } else {
      markers[idx].setLngLat([lon, lat]);
    }
  }

  // ── Render helpers ───────────────────────────────────────────────────────────

  function computeAndDraw() {
    if (!maskReady) { setStatus('Still loading mask…'); return; }

    const [A, B] = points;
    const n = gcNormal(A.lat, A.lon, B.lat, B.lon);

    // Sample at full resolution for transitions
    const allPts = sampleGC(n, TRANSITION_PTS);

    // Compute transitions, fraction, and segment stats
    const transitions = countTransitions(allPts);
    let landCount = 0;
    for (const p of allPts) landCount += isLand(p.lat, p.lon);
    const oceanFrac = (1 - landCount / allPts.length) * 100;
    const stats = computeSegmentStats(allPts);

    // Display result
    setStatus('');
    setResult(`${oceanFrac.toFixed(1)}% ocean`, `${transitions} land/ocean transitions`);
    hudSegments.innerHTML =
      `<span style="color:${COLOR_OCEAN}">▬</span> longest ocean: ${fmtKm(stats.longestOcean)}<br>` +
      `<span style="color:${COLOR_LAND}">▬</span> longest land: ${fmtKm(stats.longestLand)}`;

    // Draw main coloured line
    const displayStep = Math.max(1, Math.round(TRANSITION_PTS / DISPLAY_PTS));
    map.getSource('gc-line').setData({
      type: 'FeatureCollection',
      features: buildSegmentFeatures(unwrap(allPts), displayStep),
    });

    // Draw highlight segments
    const highlights = [];
    const oceanCoords = segToCoords(allPts, stats.oceanSeg, displayStep);
    if (oceanCoords) highlights.push({ type: 'Feature',
      geometry: { type: 'LineString', coordinates: oceanCoords },
      properties: { color: COLOR_OCEAN } });
    const landCoords = segToCoords(allPts, stats.landSeg, displayStep);
    if (landCoords) highlights.push({ type: 'Feature',
      geometry: { type: 'LineString', coordinates: landCoords },
      properties: { color: COLOR_LAND } });
    map.getSource('gc-highlight').setData({ type: 'FeatureCollection', features: highlights });
  }

  function drawFast() {
    const [A, B] = points;
    if (!A || !B) return;
    const n = gcNormal(A.lat, A.lon, B.lat, B.lon);
    const allPts = sampleGC(n, TRANSITION_PTS);
    // Single pass: fraction only, no transitions or segment coloring
    let landCount = 0;
    for (const p of allPts) landCount += isLand(p.lat, p.lon);
    const oceanFrac = (1 - landCount / allPts.length) * 100;
    setResult(`${oceanFrac.toFixed(1)}% ocean`, '');
    hudSegments.textContent = '';
    map.getSource('gc-highlight').setData(emptyFC());
    const pts = unwrap(subsample(allPts, DISPLAY_PTS));
    map.getSource('gc-line').setData({
      type: 'FeatureCollection',
      features: [{ type: 'Feature',
        geometry: { type: 'LineString', coordinates: pts.map(p => [p.lon, p.lat]) },
        properties: { color: COLOR_DRAG } }],
    });
  }

  function clearQuery() {
    map.getSource('gc-line').setData(emptyFC());
    map.getSource('gc-highlight').setData(emptyFC());
    setResult('', '');
    hudSegments.textContent = '';
    points = [null, null];
    markers.forEach(m => m && m.remove());
    markers = [null, null];
    clickCount = 0;
  }

  // ── Easter egg: Chabukswar & Mukherjee (arXiv:1804.07389) extremes ──────────
  // Press O for longest ocean line, L for longest land line
  const PAPER_OCEAN = {
    A: { lat: 25 + 17/60, lon: 66 + 40/60 },   // Sonmiani, Pakistan
    B: { lat: 58 + 37/60, lon: 162 + 14/60 },  // Kamchatka, Russia
    label: 'Longest sailable line — Chabukswar & Mukherjee (2018) — 32,090 km',
  };
  const PAPER_LAND = {
    A: { lat: 24 + 33/60, lon: 118 + 38/60 },  // Jinjiang, Fujian, China
    B: { lat: 37 +  2/60, lon: -(8 + 55/60) }, // Sagres, Portugal
    label: 'Longest drivable line — Chabukswar & Mukherjee (2018) — 11,241 km',
  };

  function loadPaperLine(line) {
    clearQuery();
    placeMarker(0, line.A.lat, line.A.lon);
    placeMarker(1, line.B.lat, line.B.lon);
    clickCount = 2;
    computeAndDraw();
    setStatus(line.label);
  }

  document.addEventListener('keydown', e => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    if (e.key === 'o' || e.key === 'O') loadPaperLine(PAPER_OCEAN);
    if (e.key === 'l' || e.key === 'L') loadPaperLine(PAPER_LAND);
  });

  // ── Start mask fetch immediately ─────────────────────────────────────────────
  loadMask();
  </script>
</body>
</html>
