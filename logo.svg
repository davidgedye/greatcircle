<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 210" role="img" aria-label="Great Circle Challenge logo">
  <defs>
    <clipPath id="globe-clip">
      <circle cx="120" cy="110" r="90"/>
    </clipPath>
    <!--
      Arc for CHALLENGE text: radius 80 from globe center (baseline sits ~10px
      inside the r=90 globe edge). Endpoints at SVG screen angles 150° and 30°
      (±60° from the bottom), sweeping counterclockwise (sweep=0) through 90°.
      150°: (51, 150)   30°: (189, 150)
    -->
    <path id="challenge-path" d="M 51 150 A 80 80 0 0 0 189 150"/>
  </defs>

  <!-- Globe background -->
  <circle cx="120" cy="110" r="90" fill="#080e18"/>

  <!-- Latitude grid lines (orthographic projection, equator-on view) -->
  <!-- lat φ: y = 110 − 90·sin(φ), x spans ±90·cos(φ) from cx=120 -->
  <g clip-path="url(#globe-clip)" stroke="#3a5a7a" stroke-width="1.2" fill="none">
    <line x1="30"  y1="110" x2="210" y2="110"/>  <!-- equator (0°) -->
    <line x1="42"  y1="65"  x2="198" y2="65"/>   <!-- +30° -->
    <line x1="42"  y1="155" x2="198" y2="155"/>  <!-- −30° -->
    <line x1="75"  y1="32"  x2="165" y2="32"/>   <!-- +60° -->
    <line x1="75"  y1="188" x2="165" y2="188"/>  <!-- −60° -->
  </g>

  <!-- Longitude grid lines (meridians as vertical ellipses) -->
  <!-- lon λ: vertical ellipse, rx = 90·sin(λ), ry = 90 -->
  <g clip-path="url(#globe-clip)" stroke="#3a5a7a" stroke-width="1.2" fill="none">
    <line x1="120" y1="20"  x2="120" y2="200"/>  <!-- 0°/180° prime meridian -->
    <ellipse cx="120" cy="110" rx="45" ry="90"/> <!-- ±30° -->
    <ellipse cx="120" cy="110" rx="78" ry="90"/> <!-- ±60° -->
  </g>

  <!-- Two highlighted great circles (wettest / driest feel) -->
  <!-- Each is a great circle: an ellipse inscribed within the globe (rx=90).
       ry controls how steeply tilted it appears; rotation sets its orientation. -->
  <g clip-path="url(#globe-clip)" fill="none">
    <ellipse cx="120" cy="110" rx="87" ry="52"
             transform="rotate(32 120 110)"
             stroke="#3d8cad" stroke-width="4" opacity="0.9"/>
    <ellipse cx="120" cy="110" rx="87" ry="56"
             transform="rotate(-20 120 110)"
             stroke="#ad4040" stroke-width="4" opacity="0.8"/>
  </g>

  <!-- Globe border -->
  <circle cx="120" cy="110" r="90" fill="none" stroke="#2a3f55" stroke-width="1.5"/>

  <!-- GREAT / CIRCLE stacked inside the globe -->
  <text x="120" y="103"
        text-anchor="middle"
        font-family="'Courier New', Courier, monospace"
        font-size="21" font-weight="bold" letter-spacing="4"
        fill="#eeeeee">GREAT</text>
  <text x="120" y="130"
        text-anchor="middle"
        font-family="'Courier New', Courier, monospace"
        font-size="21" font-weight="bold" letter-spacing="4"
        fill="#eeeeee">CIRCLE</text>

  <!-- CHALLENGE curved around the bottom -->
  <text font-family="'Courier New', Courier, monospace"
        font-size="21" font-weight="bold" letter-spacing="4" fill="#eeeeee">
    <textPath href="#challenge-path" startOffset="50%" text-anchor="middle">CHALLENGE</textPath>
  </text>
</svg>
