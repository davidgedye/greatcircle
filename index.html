<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Great Circles — Wettest &amp; Driest</title>
<meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no">
<link rel="manifest" href="/greatcircle/manifest.json">
<script>if ('serviceWorker' in navigator) navigator.serviceWorker.register('/greatcircle/sw.js');</script>
<link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet">
<script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #000; font-family: 'Courier New', monospace; }
  #map { position: absolute; inset: 0; }

  /* ── Right column (stacks panel + map card) ── */
  #right-col {
    position: absolute; top: 16px; right: 16px;
    display: flex; flex-direction: column; gap: 10px;
  }

  /* ── Panel shell ── */
  #panel {
    background: rgba(8,8,8,0.82); border: 1px solid #2a2a2a;
    border-radius: 8px; padding: 14px 16px; color: #ccc;
    font-size: 12px; min-width: 240px;
    backdrop-filter: blur(6px);
  }

  /* ── Map card ── */
  #map-card {
    background: rgba(8,8,8,0.82); border: 1px solid #2a2a2a;
    border-radius: 8px; padding: 8px 12px;
    backdrop-filter: blur(6px);
  }
  #panel h3 {
    font-size: 11px; color: #888; margin-bottom: 10px; letter-spacing: 2px;
    border-bottom: 1px solid #2a2a2a; padding-bottom: 7px;
  }
  #panel-body { overflow: visible; }

  /* ── Summary rows ── */
  #summary { margin-bottom: 4px; }
  .summary-row { display: flex; align-items: center; gap: 10px; padding: 7px 0; }
  .summary-row + .summary-row { border-top: 1px solid #1e1e1e; }
  .row-swatch { width: 14px; height: 14px; border-radius: 3px; flex-shrink: 0; opacity: 0.9; }
  .row-info { display: flex; flex-direction: column; gap: 1px; }
  .row-lbl { font-size: 11px; color: #bbb; }
  .row-pct { font-size: 13px; font-weight: bold; }

  /* ── Lakes checkbox ── */
  #lakes-toggle {
    display: flex; align-items: center; gap: 6px;
    padding: 7px 0 2px; font-size: 11px; color: #888;
    cursor: pointer; border-top: 1px solid #1e1e1e; margin-top: 2px;
  }
  #lakes-toggle input { cursor: pointer; margin: 0; accent-color: #aaa; }
  #lakes-toggle:hover { color: #ccc; }

  /* ── Collapsible Details section ── */
  .section-hdr {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 10px; color: #666; letter-spacing: 2px;
    cursor: pointer; user-select: none;
    padding: 8px 0; border-top: 1px solid #2a2a2a; margin-top: 4px;
  }
  .section-hdr:hover { color: #aaa; }
  .sec-chevron { font-size: 12px; }
  .section-body {
    overflow: hidden; max-height: 0; opacity: 0;
    transition: max-height 0.3s ease, opacity 0.25s ease;
  }
  .section-body.open { max-height: 2000px; opacity: 1; overflow: visible; }

  /* ── Layer toggles ── */
  .row { display: flex; align-items: center; margin: 6px 0; gap: 8px; cursor: pointer; }
  .row input { cursor: pointer; margin: 0; accent-color: #aaa; }
  .swatch { width: 26px; height: 3px; border-radius: 1px; flex-shrink: 0; }
  .swatch.dashed {
    background: repeating-linear-gradient(90deg,
      var(--c) 0 5px, transparent 5px 9px) !important;
  }
  .row label { cursor: pointer; line-height: 1.4; }
  #toggles { margin-top: 6px; }

  /* ── Heatmaps ── */
  #heatmaps { margin-bottom: 8px; }
  .hm-pair { display: flex; flex-direction: column; gap: 10px; align-items: center; }
  .hm-block { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .hm-label { font-size: 10px; color: #888; letter-spacing: 1px; text-align: center; }
  .hm-pct   { font-size: 11px; font-weight: bold; }
  canvas.heatmap {
    image-rendering: pixelated;
    border: 1px solid #333; border-radius: 2px; cursor: crosshair;
  }

  /* ── Dataset switcher ── */
  #dataset-switcher {
    display: flex; gap: 6px; padding: 8px 0 6px; border-bottom: 1px solid #2a2a2a; margin-bottom: 4px;
  }
  #dataset-switcher button {
    position: relative; flex: 1; background: #1a1a1a; color: #666; border: 1px solid #2a2a2a;
    border-radius: 4px; padding: 4px 0; font-size: 10px; letter-spacing: 1px;
    font-family: inherit; cursor: pointer; transition: color 0.15s, border-color 0.15s;
  }
  #dataset-switcher button.active { color: #ccc; border-color: #555; }
  #dataset-switcher button:hover:not(.active) { color: #aaa; }
  #dataset-switcher button::after {
    content: attr(data-tooltip);
    position: absolute; bottom: calc(100% + 7px); left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,0.92); border: 1px solid #444; color: #ccc;
    font-size: 10px; letter-spacing: 0; line-height: 1.5; font-weight: normal;
    padding: 6px 9px; border-radius: 4px; pointer-events: none;
    opacity: 0; transition: opacity 0.15s; width: max-content; max-width: 220px;
    white-space: normal; text-align: left; z-index: 1000;
  }
  #dataset-switcher button:hover::after { opacity: 1; }
  #dataset-switcher button:last-child::after { left: auto; right: 0; transform: none; }

  /* ── Style switcher ── */
  #style-switcher { display: flex; align-items: center; }
  #style-switcher select {
    flex: 1; background: #1a1a1a; color: #ccc; border: 1px solid #333;
    border-radius: 4px; padding: 4px 6px; font-size: 12px; font-family: inherit; cursor: pointer;
  }

  #mobile-hint { display: none; }

  /* ── Mobile bottom bar ── */
  @media (max-width: 640px) {
    #right-col {
      top: auto; bottom: 0; left: 0; right: 0;
      flex-direction: row; align-items: stretch;
      padding: 0; gap: 0;
    }
    #panel {
      flex: 1; min-width: 0;
      border-radius: 10px 0 0 0; border-bottom: none; border-right: none;
      padding: 8px 12px;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
    }
    #map-card {
      border-radius: 0 10px 0 0; border-bottom: none; border-left: none;
      padding: 8px 12px;
      display: flex; align-items: center;
    }
    #panel h3, .section-hdr, .section-body { display: none; }
    #summary { display: flex; flex-direction: row; align-items: baseline; gap: 12px; margin: 0; }
    .summary-row { padding: 0; flex-direction: row; align-items: baseline; gap: 5px; }
    .summary-row + .summary-row { border-top: none; }
    .row-info { flex-direction: row; align-items: baseline; gap: 5px; }
    .row-swatch { display: none; }
    .row-lbl { font-size: 10px; }
    .row-pct { font-size: 13px; }
    #mobile-hint {
      display: block; margin-top: 3px;
      font-size: 10px; color: #888; letter-spacing: 0.3px;
    }
    #style-switcher { flex-direction: column; gap: 4px; }
    #style-switcher span { display: none; }
    #style-switcher select { padding: 3px 4px; font-size: 10px; }
    #tooltip, #click-result { display: none !important; }
    #map-card { display: none; }
    .mapboxgl-ctrl-scale { display: none; }
    .mapboxgl-ctrl-top-left { display: none; }
    .mapboxgl-ctrl-bottom-left,
    .mapboxgl-ctrl-bottom-right { bottom: 60px !important; }
  }

  /* ── HUD overlays ── */
  #tooltip {
    position: absolute; bottom: 22px; left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.85); border: 1px solid #333;
    color: #eee; font-size: 12px; padding: 7px 14px;
    border-radius: 5px; pointer-events: none;
    opacity: 0; transition: opacity 0.15s; white-space: nowrap;
  }
  #tooltip.on { opacity: 1; }
  #click-result {
    position: absolute; bottom: 58px; left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.88); border: 1px solid #555;
    color: #eee; font-size: 12px; font-family: monospace;
    padding: 7px 16px; border-radius: 5px;
    pointer-events: none; display: none; white-space: nowrap;
  }
</style>
</head>
<body>
<div id="map"></div>

<div id="right-col">

<div id="panel">
  <h3 id="panel-title">GREAT CIRCLES</h3>
  <div id="panel-body">

    <div id="summary">
      <div class="summary-row">
        <div class="row-swatch" style="background:#00e5ff"></div>
        <div class="row-info">
          <div class="row-lbl">Wettest</div>
          <div class="row-pct" id="wet-pct" style="color:#00e5ff">–</div>
        </div>
      </div>
      <div class="summary-row">
        <div class="row-swatch" style="background:#ff1744"></div>
        <div class="row-info">
          <div class="row-lbl">Driest</div>
          <div class="row-pct" id="dry-pct" style="color:#ff1744">–</div>
        </div>
      </div>
    </div>

    <div id="mobile-hint">More details available on a bigger screen</div>

    <!-- Details section -->
    <div class="section-hdr" id="details-hdr">
      <span>DETAILS</span><span class="sec-chevron">▸</span>
    </div>
    <div class="section-body" id="details-body">
      <div id="dataset-switcher"></div>
      <label id="lakes-toggle">
        <input type="checkbox" id="lakes-chk"> Include lakes
      </label>
      <div id="toggles"></div>
      <div id="heatmaps">
        <div class="hm-pair">
          <div class="hm-block">
            <div class="hm-label" id="hm-0-label"></div>
            <canvas class="heatmap" id="hm-0" width="160" height="160"></canvas>
            <div class="hm-pct" id="hm-0-pct"></div>
          </div>
          <div class="hm-block">
            <div class="hm-label" id="hm-1-label"></div>
            <canvas class="heatmap" id="hm-1" width="160" height="160"></canvas>
            <div class="hm-pct" id="hm-1-pct"></div>
          </div>
        </div>
      </div>
    </div>

  </div><!-- /panel-body -->
</div><!-- /panel -->

<div id="map-card">
  <div id="style-switcher">
    <span style="font-size:10px;color:#888;letter-spacing:2px;margin-right:8px;">MAP</span>
  </div>
</div><!-- /map-card -->

</div><!-- /right-col -->

<div id="tooltip"></div>
<div id="click-result"></div>

<script>
let DATA, LAYERS, BEST_FRACS, FINE_GRIDS, BOUNDARIES, FINE_BOUNDARIES;

// ── Datasets ──────────────────────────────────────────────────────────────────
const DATASETS = [
  { label: 'ETOPO 2022', url: 'experiments/wettest_driest/etopo1_visuals.json', detailsUrl: 'experiments/wettest_driest/etopo1_details.json', hasLakes: false,
    tooltip: 'ETOPO 2022\nNOAA global relief model\nIce-surface topography · 1 arc-minute (~1.85 km)' },
  { label: 'GEBCO 2025', url: 'experiments/wettest_driest/gebco_visuals.json',  detailsUrl: 'experiments/wettest_driest/gebco_details.json', hasLakes: true,
    tooltip: 'GEBCO 2025\nGeneral Bathymetric Chart of the Oceans\nSub-ice bed topography · 15 arc-second (~450 m)' },
];
let activeDataset = 0;

// ── State ────────────────────────────────────────────────────────────────────
const COLORS = ['#00e5ff', '#ff1744'];   // [wet=cyan, dry=red]
let includeLakes = false;

const INVERT = { wettest: false, driest: true, 'wettest-lakes': false, 'driest-lakes': true };

function WET()    { return includeLakes ? 'wettest-lakes' : 'wettest'; }
function DRY()    { return includeLakes ? 'driest-lakes'  : 'driest';  }
function ACTIVE() { return [WET(), DRY()]; }

function expFmt(key, frac) {
  return INVERT[key]
    ? `${((1 - frac) * 100).toFixed(2)}% land`
    : `${(frac * 100).toFixed(2)}% ocean`;
}

// ── Heatmap rendering ────────────────────────────────────────────────────────
function heatColor(t) {
  const r = Math.round(255 * (1 - t) * (t < 0.5 ? 1 : 2 * (1 - t)));
  const g = Math.round(255 * Math.min(2 * t, 2 * (1 - t)) * 0.5);
  const b = Math.round(255 * t * (t > 0.5 ? 1 : 2 * t));
  return [r, g, b];
}

function drawHeatmap(canvasId, data, highlight = null) {
  const canvas = document.getElementById(canvasId);
  const ctx = canvas.getContext('2d');
  const n = data.grid.length;

  let min = Infinity, max = -Infinity;
  data.grid.forEach(row => row.forEach(v => { min = Math.min(min, v); max = Math.max(max, v); }));
  const range = max - min || 1;

  const off = document.createElement('canvas');
  off.width = n; off.height = n;
  const octx = off.getContext('2d');
  const img = octx.createImageData(n, n);
  for (let i = 0; i < n; i++) {
    for (let j = 0; j < n; j++) {
      const t = (data.grid[i][j] - min) / range;
      const c = heatColor(t);
      const idx = (i * n + j) * 4;
      img.data[idx] = c[0]; img.data[idx+1] = c[1]; img.data[idx+2] = c[2]; img.data[idx+3] = 255;
    }
  }
  octx.putImageData(img, 0, 0);
  ctx.imageSmoothingEnabled = false;
  ctx.drawImage(off, 0, 0, canvas.width, canvas.height);

  const pw = canvas.width / n, ph = canvas.height / n;
  function drawCrosshair(i_f, j_f, color) {
    const cx = (j_f + 0.5) * pw, cy = (i_f + 0.5) * ph;
    ctx.strokeStyle = color; ctx.lineWidth = 1.5;
    const r = pw * 2;
    ctx.beginPath(); ctx.moveTo(cx - r, cy); ctx.lineTo(cx + r, cy); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx, cy - r); ctx.lineTo(cx, cy + r); ctx.stroke();
  }

  drawCrosshair(data.best_i, data.best_j, '#fff');
  if (highlight !== null) drawCrosshair(highlight.i_f, highlight.j_f, highlight.color || '#ffff00');
}

function renderHeatmaps() {
  if (!FINE_GRIDS) return;
  const keys = ACTIVE();
  for (let i = 0; i < 2; i++) {
    const key = keys[i];
    const gd  = FINE_GRIDS[key];
    drawHeatmap(`hm-${i}`, gd);
    document.getElementById(`hm-${i}-label`).textContent = i === 0 ? 'WETTEST' : 'DRIEST';
    const pctEl = document.getElementById(`hm-${i}-pct`);
    pctEl.textContent = expFmt(key, gd.best_frac) + ' (best)';
    pctEl.style.color = COLORS[i];
  }
}

function initHeatmap(idx) {
  const canvasId = `hm-${idx}`;
  const pctId    = `hm-${idx}-pct`;
  const canvas   = document.getElementById(canvasId);
  const pct      = document.getElementById(pctId);

  canvas.addEventListener('click', e => {
    const key   = ACTIVE()[idx];
    const data  = FINE_GRIDS[key];
    const color = COLORS[idx];
    const n     = data.grid.length;
    const rect  = canvas.getBoundingClientRect();
    const j = Math.floor((e.clientX - rect.left) / rect.width  * n);
    const i = Math.floor((e.clientY - rect.top)  / rect.height * n);
    if (i < 0 || i >= n || j < 0 || j >= n) return;

    const tDeg = data.theta_center_deg + data.offsets_deg[i];
    const pDeg = data.phi_center_deg   + data.offsets_deg[j];
    const nVec = thetaPhiToNormal(tDeg, pDeg);
    const frac = data.grid[i][j];
    pct.textContent = expFmt(key, frac);

    if (map.getSource('perturbed')) {
      map.getSource('perturbed').setData({
        type: 'FeatureCollection',
        features: [{ type: 'Feature', properties: { color },
                     geometry: { type: 'LineString', coordinates: gcCoords(nVec) } }]
      });
    }
    clickResult.textContent = `${idx === 0 ? 'Wettest' : 'Driest'}: ${expFmt(key, frac)}  ·  ${poleStr(tDeg, pDeg)}`;
    clickResult.style.display = 'block';
    drawHeatmap(canvasId, data, { i_f: i, j_f: j, color });
    drawHeatmap(`hm-${1 - idx}`, FINE_GRIDS[ACTIVE()[1 - idx]], null);
  });
}

function initHeatmaps() {
  if (!FINE_GRIDS) return;
  renderHeatmaps();
  initHeatmap(0);
  initHeatmap(1);
}

// ── Summary rows ──────────────────────────────────────────────────────────────
function renderSummaryRows() {
  if (!BEST_FRACS) return;
  document.getElementById('wet-pct').textContent = expFmt(WET(), BEST_FRACS[WET()]);
  document.getElementById('dry-pct').textContent = expFmt(DRY(), BEST_FRACS[DRY()]);
}

// ── Lakes toggle ──────────────────────────────────────────────────────────────
function setIncludeLakes(val) {
  includeLakes = val;
  renderSummaryRows();
  if (FINE_GRIDS) renderHeatmaps();
  clearPerturbed();
  if (styleReady) {
    renderActiveLayers();
    renderPoleMarkers();
    applyCoarseVisibility();
    ['wet', 'dry'].forEach((side, si) => {
      const key = ACTIVE()[si];
      if (BOUNDARIES) {
        const src = map.getSource(`boundaries-${side}`);
        if (src) src.setData(BOUNDARIES[key] || _emptyFC);
      }
      if (FINE_BOUNDARIES) {
        const src = map.getSource(`fine-boundaries-${side}`);
        if (src) src.setData(FINE_BOUNDARIES[key] || _emptyFC);
      }
    });
  }
}

// ── Swatch helper ─────────────────────────────────────────────────────────────
function swatchHtml(color, dashed) {
  const bg = dashed
    ? `repeating-linear-gradient(90deg,${color} 0 5px,transparent 5px 9px)`
    : color;
  return `<span style="display:inline-block;width:22px;height:3px;background:${bg};`
       + `vertical-align:middle;border-radius:1px;margin:0 5px 1px 0"></span>`;
}

function poleStr(tDeg, pDeg) {
  const lat  = 90 - tDeg;
  const latS = Math.abs(lat).toFixed(2) + (lat >= 0 ? '°N' : '°S');
  const lonS = pDeg.toFixed(2) + '°E';
  return `pole ${latS} ${lonS}`;
}

// ── Vector helpers ────────────────────────────────────────────────────────────
const dot    = (a, b) => a[0]*b[0] + a[1]*b[1] + a[2]*b[2];
const vscale = (v, s) => v.map(x => x * s);
const vsub   = (a, b) => a.map((x, i) => x - b[i]);
const vnorm  = v => { const m = Math.sqrt(dot(v, v)); return v.map(x => x / m); };
const vcross = (a, b) => [a[1]*b[2]-a[2]*b[1], a[2]*b[0]-a[0]*b[2], a[0]*b[1]-a[1]*b[0]];

function latlonToCart(latDeg, lonDeg) {
  const la = latDeg * Math.PI / 180, lo = lonDeg * Math.PI / 180;
  return [Math.cos(la)*Math.cos(lo), Math.cos(la)*Math.sin(lo), Math.sin(la)];
}

function thetaPhiToNormal(tDeg, pDeg) {
  const t = tDeg * Math.PI / 180, p = pDeg * Math.PI / 180;
  return [Math.sin(t)*Math.cos(p), Math.sin(t)*Math.sin(p), Math.cos(t)];
}

function normalToThetaPhi(n) {
  let theta = Math.acos(Math.max(-1, Math.min(1, n[2]))) * 180 / Math.PI;
  let phi   = Math.atan2(n[1], n[0]) * 180 / Math.PI;
  if (phi < 0) phi += 360;
  if (phi >= 180) { phi -= 180; theta = 180 - theta; }
  return [theta, phi];
}

function perturbNormal(n0, p) {
  const proj = vsub(n0, vscale(p, dot(n0, p)));
  return dot(proj, proj) < 1e-12 ? null : vnorm(proj);
}

function gcCoords(n, nPts = 360) {
  const ref = Math.abs(n[0]) < 0.9 ? [1,0,0] : [0,1,0];
  const u   = vnorm(vcross(n, ref));
  const v   = vcross(n, u);
  const raw = [];
  for (let i = 0; i < nPts; i++) {
    const t = 2 * Math.PI * i / nPts;
    const px = Math.cos(t)*u[0] + Math.sin(t)*v[0];
    const py = Math.cos(t)*u[1] + Math.sin(t)*v[1];
    const pz = Math.cos(t)*u[2] + Math.sin(t)*v[2];
    raw.push([Math.atan2(py, px) * 180 / Math.PI,
              Math.asin(Math.max(-1, Math.min(1, pz))) * 180 / Math.PI]);
  }
  raw.push(raw[0]);
  const out = [raw[0]];
  for (let i = 1; i < raw.length; i++) {
    let lon = raw[i][0];
    const d = lon - out[out.length - 1][0];
    if (d > 180) lon -= 360; else if (d < -180) lon += 360;
    out.push([lon, raw[i][1]]);
  }
  return out;
}

function gridCoords(gd, thetaDeg, phiDeg) {
  const offs = gd.offsets_deg, n = offs.length;
  const range = offs[n-1] - offs[0];
  const i_f = (thetaDeg - gd.theta_center_deg - offs[0]) / range * (n - 1);
  const j_f = (phiDeg   - gd.phi_center_deg   - offs[0]) / range * (n - 1);
  if (i_f < 0 || i_f > n-1 || j_f < 0 || j_f > n-1) return null;
  return { i_f, j_f };
}

function interpGrid(gd, thetaDeg, phiDeg) {
  const offs = gd.offsets_deg, n = offs.length;
  const range = offs[n-1] - offs[0];
  const i_f = (thetaDeg - gd.theta_center_deg - offs[0]) / range * (n - 1);
  const j_f = (phiDeg   - gd.phi_center_deg   - offs[0]) / range * (n - 1);
  if (i_f < 0 || i_f > n-1 || j_f < 0 || j_f > n-1) return null;
  const i0 = Math.floor(i_f), j0 = Math.floor(j_f);
  const i1 = Math.min(i0+1, n-1), j1 = Math.min(j0+1, n-1);
  const di = i_f - i0, dj = j_f - j0;
  return gd.grid[i0][j0]*(1-di)*(1-dj) + gd.grid[i0][j1]*(1-di)*dj
       + gd.grid[i1][j0]*di*(1-dj)     + gd.grid[i1][j1]*di*dj;
}

// ── Style switcher ────────────────────────────────────────────────────────────
const STYLES = [
  { label: 'Satellite',         url: 'mapbox://styles/mapbox/satellite-v9' },
  { label: 'Satellite + roads', url: 'mapbox://styles/mapbox/satellite-streets-v12' },
  { label: 'Dark',              url: 'mapbox://styles/mapbox/dark-v11' },
  { label: 'Outdoors',          url: 'mapbox://styles/mapbox/outdoors-v12' },
  { label: 'Light',             url: 'mapbox://styles/mapbox/light-v11' },
];
const currentStyle = 'mapbox://styles/mapbox/satellite-streets-v12';
const sel = document.createElement('select');
STYLES.forEach(s => {
  const opt = document.createElement('option');
  opt.value = s.url; opt.textContent = s.label;
  if (s.url === currentStyle) opt.selected = true;
  sel.appendChild(opt);
});
document.getElementById('style-switcher').appendChild(sel);


let detailsEverOpened = false;
document.getElementById('details-hdr').addEventListener('click', () => {
  const body    = document.getElementById('details-body');
  const chev    = document.querySelector('#details-hdr .sec-chevron');
  const opening = body.classList.toggle('open');
  chev.textContent = opening ? '▾' : '▸';
  if (opening && !detailsEverOpened) {
    detailsEverOpened = true;
    document.querySelectorAll('#toggles input[type=checkbox]').forEach(chk => { chk.checked = true; });
    coarseShow['wet-coarse'] = true;
    coarseShow['dry-coarse'] = true;
    if (dataReady && styleReady) applyCoarseVisibility();
  }
  if (opening && dataReady && styleReady) {
    loadAndApplyDetails();
  } else if (styleReady) {
    updateBoundaryVisibility();
  }
});

// ── Map ───────────────────────────────────────────────────────────────────────
mapboxgl.accessToken = 'pk.eyJ1IjoiZGF2aWRnZWR5ZSIsImEiOiJjbWtvejk5bWkwYnBxM3JxNTE0ZjN6ZmowIn0.CaVScVkAo9uhpyebGqaQNg';
const isMobile = window.matchMedia('(max-width: 640px)').matches;
const _col = document.getElementById('right-col');
const _initPad = isMobile
  ? { top: 0, bottom: 100, left: 0, right: 0 }   // refined after paint
  : { top: 0, bottom: 0, left: 0, right: (_col.offsetWidth || 240) + 20 };
function initialZoom() {
  const w = isMobile ? window.innerWidth : window.innerWidth - _initPad.right;
  const h = isMobile ? window.innerHeight - _initPad.bottom : window.innerHeight;
  const tighter = Math.min(w, h);
  // Globe diameter ≈ 512 * 2^z / π; solve for 80% of tighter dimension
  return Math.log2(0.8 * tighter * Math.PI / 512);
}
const map = new mapboxgl.Map({
  container: 'map',
  style: currentStyle,
  projection: 'globe',
  center: [129, 0],
  zoom: initialZoom(),
});
map.jumpTo({ center: [129, 0], zoom: initialZoom(), padding: _initPad });
if (isMobile) requestAnimationFrame(() => {
  const h = _col.offsetHeight;
  if (h) map.easeTo({ padding: { top: 0, bottom: h + 20, left: 0, right: 0 }, duration: 0 });
});
map.addControl(new mapboxgl.NavigationControl({ showCompass: false }), 'top-left');
map.addControl(new mapboxgl.ScaleControl({ maxWidth: 200, unit: 'metric' }), 'bottom-left');

// ── Perturbed circle & HUD ────────────────────────────────────────────────────
const clickResult = document.getElementById('click-result');

function clearPerturbed() {
  if (map.getSource('perturbed'))
    map.getSource('perturbed').setData({ type: 'FeatureCollection', features: [] });
  clickResult.style.display = 'none';
  if (FINE_GRIDS) {
    const [k0, k1] = ACTIVE();
    drawHeatmap('hm-0', FINE_GRIDS[k0], null);
    drawHeatmap('hm-1', FINE_GRIDS[k1], null);
  }
}

map.on('click', e => {
  if (e.originalEvent._handled) return;
  if (!FINE_GRIDS) return;
  const clickPt  = latlonToCart(e.lngLat.lat, e.lngLat.lng);
  const features = [];
  const parts    = [];
  const hmHL     = {};
  const active   = ACTIVE();

  for (let si = 0; si < 2; si++) {
    const key   = active[si];
    const color = COLORS[si];
    const gd    = FINE_GRIDS[key];
    const bestTheta = gd.theta_center_deg + gd.offsets_deg[gd.best_i];
    const bestPhi   = gd.phi_center_deg   + gd.offsets_deg[gd.best_j];
    const n0  = thetaPhiToNormal(bestTheta, bestPhi);
    const n1  = perturbNormal(n0, clickPt);
    if (!n1) continue;
    const [tn, pn] = normalToThetaPhi(n1);
    const frac = interpGrid(gd, tn, pn);
    if (frac === null) continue;
    features.push({
      type: 'Feature', properties: { color },
      geometry: { type: 'LineString', coordinates: gcCoords(n1) }
    });
    const lbl = si === 0 ? 'Wettest' : 'Driest';
    parts.push(swatchHtml(color, false) + `${lbl}: ${expFmt(key, gd.best_frac)}`
             + `&ensp;` + swatchHtml(color, true) + expFmt(key, frac));
    const pos = gridCoords(gd, tn, pn);
    if (pos) hmHL[si] = { ...pos, color };
  }

  if (features.length === 0) { clearPerturbed(); return; }
  map.getSource('perturbed').setData({ type: 'FeatureCollection', features });
  clickResult.innerHTML = parts.join('&ensp;&nbsp;·&ensp;&nbsp;');
  clickResult.style.display = 'block';
  const [k0, k1] = ACTIVE();
  drawHeatmap('hm-0', FINE_GRIDS[k0], hmHL[0] || null);
  drawHeatmap('hm-1', FINE_GRIDS[k1], hmHL[1] || null);
});

document.addEventListener('keydown', e => { if (e.key === 'Escape') clearPerturbed(); });

// ── North-up control ──────────────────────────────────────────────────────────
class NorthUpControl {
  onAdd(map) {
    this._map = map;
    this._container = document.createElement('div');
    this._container.className = 'mapboxgl-ctrl mapboxgl-ctrl-group';
    const btn = document.createElement('button');
    btn.title = 'Reset to north-up, no tilt';
    btn.style.cssText = 'font-size:18px;font-weight:bold;width:30px;height:30px;cursor:pointer;background:rgba(255,255,255,0.9);border:none;';
    btn.textContent = '⬆';
    btn.addEventListener('click', () => map.easeTo({ bearing: 0, pitch: 0, duration: 300 }));
    this._container.appendChild(btn);
    return this._container;
  }
  onRemove() { this._container.parentNode.removeChild(this._container); }
}

// ── Map layer setup ───────────────────────────────────────────────────────────
let togglesBuilt = false;

// Coarse visibility state — keyed by concept, not by experiment
const coarseShow = { 'wet-coarse': false, 'dry-coarse': false };

const BOUNDARY_LAYER_IDS = ['boundaries-wet', 'boundaries-dry', 'fine-boundaries-wet', 'fine-boundaries-dry'];
const ARROW_ZOOM_THRESHOLD = 2;
function setBoundaryVisibility(visible) {
  const vis = visible ? 'visible' : 'none';
  BOUNDARY_LAYER_IDS.forEach(id => {
    if (map.getLayer(id)) map.setLayoutProperty(id, 'visibility', vis);
  });
}
function updateBoundaryVisibility() {
  const show = document.getElementById('details-body').classList.contains('open') || map.getZoom() >= ARROW_ZOOM_THRESHOLD;
  const setVis = (id, on) => { if (map.getLayer(id)) map.setLayoutProperty(id, 'visibility', on ? 'visible' : 'none'); };
  setVis('fine-boundaries-wet', show);
  setVis('fine-boundaries-dry', show);
  setVis('boundaries-wet', show && coarseShow['wet-coarse']);
  setVis('boundaries-dry', show && coarseShow['dry-coarse']);
}

function applyCoarseVisibility() {
  const [wetKey, dryKey] = ACTIVE();
  // Build the map of which layer IDs should be visible
  const shouldShow = {
    [wetKey + '-coarse']: coarseShow['wet-coarse'],
    [dryKey + '-coarse']: coarseShow['dry-coarse'],
  };
  LAYERS.filter(l => !l.id.endsWith('-fine')).forEach(l => {
    if (!map.getLayer(l.id)) return;
    map.setLayoutProperty(l.id, 'visibility', shouldShow[l.id] ? 'visible' : 'none');
  });
  updateBoundaryVisibility();
}

function renderActiveLayers() {
  const active = ACTIVE();
  LAYERS.filter(l => l.id.endsWith('-fine')).forEach(l => {
    if (!map.getLayer(l.id)) return;
    const idx = active.indexOf(l.id.replace('-fine', ''));
    if (idx === -1) {
      map.setLayoutProperty(l.id, 'visibility', 'none');
    } else {
      map.setLayoutProperty(l.id, 'visibility', 'visible');
      map.setPaintProperty(l.id, 'line-color', COLORS[idx]);
    }
  });
}

function renderPoleMarkers() {
  if (!map.getSource('poles') || !FINE_GRIDS) return;
  const features = [];
  ACTIVE().forEach((key, i) => {
    const color = COLORS[i];
    const gd    = FINE_GRIDS[key];
    const tDeg  = gd.theta_center_deg + gd.offsets_deg[gd.best_i];
    const pDeg  = gd.phi_center_deg   + gd.offsets_deg[gd.best_j];
    const lat   = 90 - tDeg;
    const label = i === 0 ? 'Wettest' : 'Driest';
    for (const [lon, la] of [[pDeg, lat], [pDeg - 180, -lat]]) {
      features.push({
        type: 'Feature',
        properties: { color, key, label },
        geometry: { type: 'Point', coordinates: [lon, la] }
      });
    }
  });
  map.getSource('poles').setData({ type: 'FeatureCollection', features });
}

function setupMapLayers() {
  map.setFog({});
  sel.addEventListener('change', () => map.setStyle(sel.value));

  const active = ACTIVE();
  LAYERS.forEach(l => {
    map.addSource(l.id, { type: 'geojson', data: DATA[l.id] });
    const paint = { 'line-color': l.color, 'line-width': l.width, 'line-opacity': l.opacity };
    if (l.dashed) paint['line-dasharray'] = [5, 4];
    const chk = document.getElementById(`chk-${l.id}`);
    const vis = l.id.endsWith('-fine')
      ? (active.includes(l.id.replace('-fine', '')) ? 'visible' : 'none')
      : (chk ? (chk.checked ? 'visible' : 'none') : (l.visible ? 'visible' : 'none'));
    map.addLayer({
      id: l.id, type: 'line', source: l.id, paint,
      layout: { 'line-cap': l.dashed ? 'butt' : 'round', 'line-join': 'round', 'visibility': vis },
    });
  });
  renderActiveLayers();

  // Pole markers
  if (FINE_GRIDS) {
    map.addSource('poles', { type: 'geojson', data: { type: 'FeatureCollection', features: [] } });
    map.addLayer({
      id: 'poles', type: 'symbol', source: 'poles',
      layout: {
        'text-field': '+', 'text-size': 24,
        'text-font': ['DIN Offc Pro Bold', 'Arial Unicode MS Bold'],
        'text-allow-overlap': true, 'text-ignore-placement': true,
      },
      paint: {
        'text-color': ['get', 'color'],
        'text-halo-color': 'rgba(0,0,0,0.7)', 'text-halo-width': 1.5,
      }
    });
    renderPoleMarkers();

    map.on('click', 'poles', e => {
      e.originalEvent._handled = true;
      const p   = e.features[0].properties;
      const [lon, lat] = e.features[0].geometry.coordinates;
      const gd  = FINE_GRIDS[p.key];
      const latS = Math.abs(lat).toFixed(2) + (lat >= 0 ? '°N' : '°S');
      const lonS = Math.abs(lon).toFixed(2) + (lon >= 0 ? '°E' : '°W');
      clickResult.textContent =
        `${p.label} pole  ·  ${expFmt(p.key, gd.best_frac)}  ·  ${latS} ${lonS}  ·  axis point equidistant from every point on the circle`;
      clickResult.style.display = 'block';
    });
    map.on('mousemove',  'poles', () => { map.getCanvas().style.cursor = 'pointer'; });
    map.on('mouseleave', 'poles', () => { map.getCanvas().style.cursor = ''; });
  }

  // Perturbed circle
  map.addSource('perturbed', { type: 'geojson', data: { type: 'FeatureCollection', features: [] } });
  map.addLayer({
    id: 'perturbed', type: 'line', source: 'perturbed',
    paint: { 'line-color': ['get', 'color'], 'line-width': 2.5, 'line-opacity': 0.9, 'line-dasharray': [6, 4] },
    layout: { 'line-cap': 'butt', 'line-join': 'round' }
  });

  // Land/water boundary arrows
  const _emptyFC = { type: 'FeatureCollection', features: [] };
  function _arrowLayer(id, sourceId, color) {
    return {
      id, type: 'symbol', source: sourceId,
      layout: {
        'visibility': 'none',
        'text-field': '▲',
        'text-size': ['interpolate', ['linear'], ['zoom'], 0, 7, 4, 11, 8, 18],
        'text-rotate': ['get', 'bearing'],
        'text-rotation-alignment': 'map',
        'text-allow-overlap': true,
        'text-ignore-placement': true,
      },
      paint: {
        'text-color': color,
        'text-halo-color': '#000',
        'text-halo-width': 1.5,
        'text-opacity': 0.9,
      },
    };
  }
  ['wet', 'dry'].forEach((side, si) => {
    map.addSource(`boundaries-${side}`,      { type: 'geojson', data: _emptyFC });
    map.addSource(`fine-boundaries-${side}`, { type: 'geojson', data: _emptyFC });
    map.addLayer(_arrowLayer(`boundaries-${side}`,      `boundaries-${side}`,      COLORS[si]));
    map.addLayer(_arrowLayer(`fine-boundaries-${side}`, `fine-boundaries-${side}`, COLORS[si]));
  });

  // Hover tooltip
  const tip = document.getElementById('tooltip');
  LAYERS.forEach(l => {
    map.on('mousemove', l.id, e => {
      const p = e.features[0].properties;
      tip.textContent = `${p.label}  ·  ${p.ocean_pct}  ·  ${poleStr(p.theta, p.phi)}`;
      tip.classList.add('on');
      map.getCanvas().style.cursor = 'crosshair';
    });
    map.on('mouseleave', l.id, () => {
      tip.classList.remove('on');
      map.getCanvas().style.cursor = '';
    });
  });

  // Layer toggles — 4 concept rows, experiment-agnostic, built once
  if (!togglesBuilt) {
    const container = document.getElementById('toggles');
    [
      { concept: 'wet-coarse', label: 'Wettest 10 (coarse)', color: '#1565c0', h: 2 },
      { concept: 'dry-coarse', label: 'Driest 10 (coarse)',  color: '#7f0000', h: 2 },
    ].forEach(({ concept, label, color, h }) => {
      const div = document.createElement('div');
      div.className = 'row';
      const chk = document.createElement('input');
      chk.type = 'checkbox';
      const swatch = document.createElement('div');
      swatch.className = 'swatch';
      swatch.style.cssText = `background:${color};--c:${color};height:${h}px`;
      const lbl = document.createElement('label');
      lbl.textContent = label;
      div.appendChild(chk);
      div.appendChild(swatch);
      div.appendChild(lbl);
      chk.addEventListener('change', ev => {
        coarseShow[concept] = ev.target.checked;
        applyCoarseVisibility();
      });
      container.appendChild(div);
    });
    togglesBuilt = true;
  }
  applyCoarseVisibility();
}

// ── Boot ──────────────────────────────────────────────────────────────────────
let styleReady = false, dataReady = false;

map.on('zoomend', () => {
  if (!styleReady || !dataReady) return;
  if (map.getZoom() >= ARROW_ZOOM_THRESHOLD && !detailsCache[activeDataset]) {
    loadAndApplyDetails();
  } else {
    updateBoundaryVisibility();
  }
});

map.on('style.load', () => {
  styleReady = true;
  if (dataReady) {
    setupMapLayers();
    const detailsOpen = document.getElementById('details-body').classList.contains('open');
    if (detailsOpen || map.getZoom() >= ARROW_ZOOM_THRESHOLD) loadAndApplyDetails();
  }
});

function applyDataset(d) {
  DATA        = d.layers;
  LAYERS      = d.layer_meta;
  BEST_FRACS  = d.best_fracs || null;
  FINE_GRIDS      = null;
  BOUNDARIES      = null;
  FINE_BOUNDARIES = null;
}

const detailsCache = {};

function applyDetails(d) {
  FINE_GRIDS      = d.fine_grids      || null;
  BOUNDARIES      = d.boundaries      || null;
  FINE_BOUNDARIES = d.fine_boundaries || null;
}

function ensureDetails(idx) {
  if (detailsCache[idx]) return Promise.resolve(detailsCache[idx]);
  return fetch(DATASETS[idx].detailsUrl)
    .then(r => r.json())
    .then(d => { detailsCache[idx] = d; return d; });
}

function loadAndApplyDetails() {
  ensureDetails(activeDataset).then(d => {
    applyDetails(d);
    const empty = { type: 'FeatureCollection', features: [] };
    ['wet', 'dry'].forEach((side, si) => {
      const key = ACTIVE()[si];
      const src  = map.getSource(`boundaries-${side}`);
      const fsrc = map.getSource(`fine-boundaries-${side}`);
      if (src)  src.setData((BOUNDARIES      && BOUNDARIES[key])      || empty);
      if (fsrc) fsrc.setData((FINE_BOUNDARIES && FINE_BOUNDARIES[key]) || empty);
    });
    renderHeatmaps();
    renderPoleMarkers();
    updateBoundaryVisibility();
  });
}

function switchDataset(idx) {
  if (idx === activeDataset) return;
  activeDataset = idx;
  const ds = DATASETS[idx];

  // Update button states
  document.querySelectorAll('#dataset-switcher button').forEach((btn, i) => {
    btn.classList.toggle('active', i === idx);
  });

  // Lakes toggle: hide if dataset has no lakes data; restore checkbox state when showing
  const lakesToggle = document.getElementById('lakes-toggle');
  lakesToggle.style.display = ds.hasLakes ? '' : 'none';
  if (!ds.hasLakes && includeLakes) setIncludeLakes(false);
  if (ds.hasLakes) document.getElementById('lakes-chk').checked = includeLakes;

  fetch(ds.url).then(r => r.json()).then(d => {
    applyDataset(d);

    // Update all great-circle line sources
    LAYERS.forEach(l => {
      if (map.getSource(l.id)) map.getSource(l.id).setData(DATA[l.id]);
    });

    // Clear boundary sources until details loads
    const empty = { type: 'FeatureCollection', features: [] };
    ['wet', 'dry'].forEach(side => {
      const src  = map.getSource(`boundaries-${side}`);
      const fsrc = map.getSource(`fine-boundaries-${side}`);
      if (src)  src.setData(empty);
      if (fsrc) fsrc.setData(empty);
    });

    clearPerturbed();
    renderSummaryRows();
    renderActiveLayers();
    applyCoarseVisibility();

    const detailsOpen = document.getElementById('details-body').classList.contains('open');
    if (detailsOpen) loadAndApplyDetails();
  }).catch(err => console.error('Failed to load', ds.url, err));
}

// Build dataset switcher buttons
DATASETS.forEach((ds, i) => {
  const btn = document.createElement('button');
  btn.textContent = ds.label;
  if (ds.tooltip) btn.setAttribute('data-tooltip', ds.tooltip);
  if (i === 0) btn.classList.add('active');
  btn.addEventListener('click', () => switchDataset(i));
  document.getElementById('dataset-switcher').appendChild(btn);
});

fetch(DATASETS[0].url)
  .then(r => r.json())
  .then(d => {
    applyDataset(d);
    dataReady = true;
    renderSummaryRows();
    document.getElementById('lakes-chk').addEventListener('change', e => setIncludeLakes(e.target.checked));
    document.getElementById('lakes-toggle').style.display = DATASETS[activeDataset].hasLakes ? '' : 'none';
    if (styleReady) setupMapLayers();
  })
  .catch(err => console.error('Failed to load', DATASETS[0].url, err));
</script>
